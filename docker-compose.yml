version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Ironclad GM – Docker Compose
# Storage services (ironclad-storage) are isolated from the external network.
# Compute services (ironclad-compute) handle all external API routing.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  ironclad-compute:
    driver: bridge
  ironclad-storage:
    driver: bridge
    internal: true   # no direct external access

volumes:
  postgres-data:
  redis-data:
  chroma-data:
  ollama-models:
  csv-exports:
  media-assets:

services:

  # ── Orchestrator ────────────────────────────────────────────────────────────
  ironclad-orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: ironclad-orchestrator
    restart: unless-stopped
    networks:
      - ironclad-compute
      - ironclad-storage
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=ironclad-db
      - REDIS_HOST=ironclad-cache
      - OLLAMA_HOST=http://ironclad-ollama:11434
      - CHROMA_HOST=ironclad-chroma
      - MEDIA_PROXY_URL=http://media-asset-proxy:8001
    depends_on:
      ironclad-db:
        condition: service_healthy
      ironclad-cache:
        condition: service_healthy
      ironclad-ollama:
        condition: service_started
      ironclad-chroma:
        condition: service_started
    volumes:
      - csv-exports:/app/exports

  # ── Discord Bot Listener ────────────────────────────────────────────────────
  ironclad-discord:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: ironclad-discord
    restart: unless-stopped
    networks:
      - ironclad-compute
    env_file: .env
    environment:
      - ORCHESTRATOR_URL=http://ironclad-orchestrator:8000
    depends_on:
      - ironclad-orchestrator

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  ironclad-db:
    image: postgres:16-alpine
    container_name: ironclad-db
    restart: unless-stopped
    networks:
      - ironclad-storage
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ironclad}
      POSTGRES_USER: ${POSTGRES_USER:-ironclad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ironclad} -d ${POSTGRES_DB:-ironclad}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis Session Cache ─────────────────────────────────────────────────────
  ironclad-cache:
    image: redis:7-alpine
    container_name: ironclad-cache
    restart: unless-stopped
    networks:
      - ironclad-storage
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CSV Sync Worker ─────────────────────────────────────────────────────────
  ironclad-csv-sync:
    build:
      context: ./csv-sync
      dockerfile: Dockerfile
    container_name: ironclad-csv-sync
    restart: unless-stopped
    networks:
      - ironclad-storage
    env_file: .env
    environment:
      - DB_HOST=ironclad-db
      - REDIS_HOST=ironclad-cache
    depends_on:
      ironclad-db:
        condition: service_healthy
      ironclad-cache:
        condition: service_healthy
    volumes:
      - csv-exports:/app/exports

  # ── Local Ollama LLM (Mechanical Engine) ───────────────────────────────────
  ironclad-ollama:
    image: ollama/ollama:latest
    container_name: ironclad-ollama
    restart: unless-stopped
    networks:
      - ironclad-compute
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment to use GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── ChromaDB Vector Store (RAG) ─────────────────────────────────────────────
  ironclad-chroma:
    image: chromadb/chroma:latest
    container_name: ironclad-chroma
    restart: unless-stopped
    networks:
      - ironclad-compute
      - ironclad-storage
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # ── Media Asset Proxy ───────────────────────────────────────────────────────
  media-asset-proxy:
    build:
      context: ./media-proxy
      dockerfile: Dockerfile
    container_name: media-asset-proxy
    restart: unless-stopped
    networks:
      - ironclad-compute
    ports:
      - "8001:8001"
    volumes:
      - media-assets:/app/assets

  # ── Lavalink Audio Engine ───────────────────────────────────────────────────
  lavalink-audio:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink-audio
    restart: unless-stopped
    networks:
      - ironclad-compute
    environment:
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:?LAVALINK_PASSWORD required}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2333/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
