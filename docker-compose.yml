version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Aetheris Scribe Engine — Docker Compose
# TDR-compliant deployment. Root: /srv/aetheris_v1/
#
# Networks:
#   aetheris_net   — internal bridge (all services)
#   aetheris_store — storage-only, no external access
#
# Services:
#   scribe         Discord bot + orchestrator (Python 3.11)
#   brain          Ollama LLM (Intel GPU /dev/dri passthrough)
#   janitor        Alpine GFS backup + 30-day media prune
#   pulse          Flask health/status sidecar (:58291)
#   ironclad-db    PostgreSQL 16
#   ironclad-cache Redis 7
#   ironclad-chroma ChromaDB (RAG)
#   ironclad-csv-sync CSV export worker
#   media-proxy    Static asset server (:8001)
#   lavalink       Audio engine (:2333)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  aetheris_net:
    driver: bridge
  aetheris_store:
    driver: bridge
    internal: true   # no direct external access

volumes:
  postgres-data:
  redis-data:
  chroma-data:
  ollama-models:
  csv-exports:
  media-assets:
  pdf-uploads:

services:

  # ── Scribe (Orchestrator — Pipeline Engine) ──────────────────────────────────
  scribe:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: aetheris-scribe
    restart: unless-stopped
    networks:
      - aetheris_net
      - aetheris_store
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=ironclad-db
      - REDIS_HOST=ironclad-cache
      - OLLAMA_HOST=http://brain:11434
      - CHROMA_HOST=ironclad-chroma
      - MEDIA_PROXY_URL=http://media-proxy:8001
      - NATS_HOST=aetheris-nats
      - NATS_PORT=4222
      - MAP_RENDERER_URL=http://aetheris-map:3001
      - PDF_UPLOAD_DIR=/app/pdf_uploads
      - WORLD_DATA_DIR=/app/data
      - LOGS_DIR=/app/logs
      - BACKUPS_DIR=/app/backups
    depends_on:
      ironclad-db:
        condition: service_healthy
      ironclad-cache:
        condition: service_healthy
      brain:
        condition: service_started
      ironclad-chroma:
        condition: service_started
      aetheris-nats:
        condition: service_started
    volumes:
      - ./data:/app/data          # shared global data (TDR §2)
      - ./logs:/app/logs          # structured logs
      - ./backups:/app/backups    # GFS backup target
      - csv-exports:/app/exports
      - pdf-uploads:/app/pdf_uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Discord Bot Listener (Scribe front-end) ───────────────────────────────────
  ironclad-discord:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: aetheris-discord
    restart: unless-stopped
    networks:
      - aetheris_net
    env_file: .env
    environment:
      - ORCHESTRATOR_URL=http://scribe:8000
    depends_on:
      scribe:
        condition: service_healthy

  # ── Brain (Ollama — Local AI, Intel GPU) ──────────────────────────────────────
  brain:
    image: ollama/ollama:latest
    container_name: aetheris-brain
    restart: unless-stopped
    networks:
      - aetheris_net
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama-models:/root/.ollama
    devices:
      - /dev/dri:/dev/dri         # Intel GPU passthrough (TDR §1)
    group_add:
      - video
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Janitor (Alpine — GFS Backup + 30-day Media Prune) ───────────────────────
  # TDR §4: Alpine, GFS Backup Shell, 30-day Pruning Logic
  janitor:
    build:
      context: ./janitor
      dockerfile: Dockerfile
    container_name: aetheris-janitor
    restart: unless-stopped
    networks:
      - aetheris_net
    volumes:
      - ./data:/app/data          # read/scan data assets
      - ./backups:/app/backups    # write GFS backups here
      - ./logs:/app/logs          # write janitor logs
    environment:
      - GFS_DAILY_KEEP=7
      - GFS_WEEKLY_KEEP=2
      - GFS_MONTHLY_KEEP=1
      - PRUNE_MAX_AGE_DAYS=30
      - BACKUP_INTERVAL_HOURS=24
      - PRUNE_INTERVAL_HOURS=6

  # ── PostgreSQL Database (pgvector) ─────────────────────────────────────────
  # Uses pgvector/pgvector:pg16 for built-in vector similarity search (TDR §2).
  ironclad-db:
    image: pgvector/pgvector:pg16
    container_name: aetheris-db
    restart: unless-stopped
    networks:
      - aetheris_store
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ironclad}
      POSTGRES_USER: ${POSTGRES_USER:-ironclad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ironclad} -d ${POSTGRES_DB:-ironclad}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis Session Cache ─────────────────────────────────────────────────────
  ironclad-cache:
    image: redis:7-alpine
    container_name: aetheris-cache
    restart: unless-stopped
    networks:
      - aetheris_store
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CSV Sync Worker ─────────────────────────────────────────────────────────
  ironclad-csv-sync:
    build:
      context: ./csv-sync
      dockerfile: Dockerfile
    container_name: aetheris-csv-sync
    restart: unless-stopped
    networks:
      - aetheris_store
    env_file: .env
    environment:
      - DB_HOST=ironclad-db
      - REDIS_HOST=ironclad-cache
    depends_on:
      ironclad-db:
        condition: service_healthy
      ironclad-cache:
        condition: service_healthy
    volumes:
      - csv-exports:/app/exports

  # ── ChromaDB Vector Store (RAG) ─────────────────────────────────────────────
  ironclad-chroma:
    image: chromadb/chroma:latest
    container_name: aetheris-chroma
    restart: unless-stopped
    networks:
      - aetheris_net
      - aetheris_store
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # ── Media Asset Proxy ───────────────────────────────────────────────────────
  media-proxy:
    build:
      context: ./media-proxy
      dockerfile: Dockerfile
    container_name: aetheris-media
    restart: unless-stopped
    networks:
      - aetheris_net
    ports:
      - "8001:8001"
    volumes:
      - media-assets:/app/assets

  # ── Pulse (Health Sentinel — Flask Sidecar) ──────────────────────────────────
  # TDR §5: Headless status reporting via Flask Pulse Web-UI (Port 58291)
  pulse:
    build:
      context: ./health-sentinel
      dockerfile: Dockerfile
    container_name: aetheris-pulse
    restart: unless-stopped
    networks:
      - aetheris_net
      - aetheris_store
    ports:
      - "58291:58291"
    env_file: .env
    environment:
      - REDIS_HOST=ironclad-cache
    depends_on:
      ironclad-cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:58291/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Lavalink Audio Engine ───────────────────────────────────────────────────
  lavalink-audio:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: aetheris-lavalink
    restart: unless-stopped
    networks:
      - aetheris_net
    environment:
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:?LAVALINK_PASSWORD required}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2333/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── NATS Message Bus (TDR §3) ───────────────────────────────────────────────
  # Multi-agent pub/sub for GM ↔ NPC ↔ map-renderer communication.
  # Internal only — not exposed to the public internet.
  aetheris-nats:
    image: nats:2-alpine
    container_name: aetheris-nats
    restart: unless-stopped
    networks:
      - aetheris_net
    # No external port mapping — scribe and map-renderer connect via internal network.
    healthcheck:
      test: ["CMD-SHELL", "nats-server --ping 2>/dev/null || wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Map Renderer (TDR §4 Option 2) ─────────────────────────────────────────
  # Alpine/Node.js service. Subscribes to NATS for coordinate updates,
  # renders the Fog-of-War PNG in RAM using canvas, and caches the result in
  # Redis. Served to the Discord bot via GET /map/<campaign_id>.
  aetheris-map:
    build:
      context: ./map-renderer
      dockerfile: Dockerfile
    container_name: aetheris-map
    restart: unless-stopped
    networks:
      - aetheris_net
      - aetheris_store
    environment:
      - NATS_URL=nats://aetheris-nats:4222
      - REDIS_HOST=ironclad-cache
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD required}
      - MAP_RENDERER_PORT=3001
      - MAP_TILE_SIZE=32
      - MAP_COLS=20
      - MAP_ROWS=20
    depends_on:
      aetheris-nats:
        condition: service_started
      ironclad-cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
